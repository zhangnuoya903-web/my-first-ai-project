<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>隧道二衬台车智能报价助手</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="container">

        <h1>隧道二衬台车智能报价助手</h1>

        <div class="form-box">

            <label>
                项目名称：
                <input id="projectName" placeholder="请输入项目名称">
            </label>

            <label>
                台车长度（米）：
                <input id="carLength" type="number" placeholder="请输入长度">
            </label>

            <label>
                钢材重量（吨）：
                <input id="steelWeight" type="number" placeholder="请输入重量">
            </label>

            <label>
                钢材价格（元/吨）：
                <input id="steelPrice" type="number" placeholder="请输入价格">
            </label>

            <label>
                人工费用：
                <input id="laborCost" type="number" placeholder="请输入人工费">
            </label>

            <label>
                其他费用：
                <input id="otherCost" type="number" placeholder="请输入其他费用">
            </label>


            <button id="calculate">
                计算报价
            </button>

        </div>


        <div class="result">

            <h2>计算结果</h2>

            <p id="resultText">
                等待计算...
            </p>

        </div>

    </div>


<script src="script.js"></script>

</body>

</html>
